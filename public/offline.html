<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>Нет подключения к интернету</title>
    <style>
      :root {
        --bg: #f5f6f8;
        --card: #ffffff;
        --text: #1a1a1a;
        --muted: #6b7280;
        --accent: #2563eb;
        --border: #e5e7eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e0f11;
          --card: #17191c;
          --text: #f2f3f5;
          --muted: #9aa0a6;
          --accent: #5b8cff;
          --border: #2a2d31;
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        color: var(--muted);
      }
      h1 { font-size: 22px; margin: 0 0 10px; }
      p { color: var(--muted); font-size: 15px; line-height: 1.55; margin: 0 0 24px; }
      button {
        border: none;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        font-size: 16px;
        padding: 14px 28px;
        border-radius: 14px;
        cursor: pointer;
      }
      .status { margin-top: 16px; font-size: 13px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
      <h1>Нет подключения к интернету</h1>
      <p>Проверьте Wi-Fi или мобильную сеть и попробуйте снова. Как только соединение восстановится, страница откроется.</p>
      <button onclick="location.reload()">Повторить</button>
      <div class="status" id="status"></div>
    </div>
    <script>
      // Как только сеть вернётся — автоматически перезагружаем страницу.
      window.addEventListener('online', () => location.reload())
    </script>
  </body>
</html>
